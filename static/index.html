<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Autonomous Document Agent</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-labelledby="page-title">
        <header class="topbar">
          <div>
            <p class="eyebrow">Autonomous Document Agent</p>
            <h1 id="page-title">Generate a document from a business request</h1>
          </div>
          <div class="status" id="status">Checking model...</div>
        </header>

        <div class="layout">
          <section class="panel">
            <div class="panel-head">
              <h2>Request</h2>
            </div>
            <form id="agentForm">
              <label for="requestText">Business request or meeting notes</label>
              <textarea id="requestText" name="request" required></textarea>
              <div class="actions">
                <button id="submitBtn" type="submit">Generate document</button>
                <button class="secondary" id="clearBtn" type="button">Clear</button>
              </div>
            </form>
          </section>

          <section class="panel results" aria-live="polite">
            <div class="panel-head">
              <h2>Result</h2>
              <span id="backendTag" class="tag">Model: unknown</span>
            </div>
            <div id="emptyState" class="empty">
              Run a request to generate a Word document.
            </div>
            <div id="result" class="hidden"></div>
          </section>
        </div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
